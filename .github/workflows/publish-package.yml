name: Publish Guardrails Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @guardrails/guardrails build

      - name: Prepare npm package name and version
        working-directory: packages/guardrails
        run: node ./scripts/prepare-publish-package.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_PACKAGE_NAME: guard
          PUBLISH_SCOPE: two-pebble

      - run: pnpm publish --no-git-checks
        working-directory: packages/guardrails
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
