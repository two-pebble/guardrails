name: Publish Guardrails Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Normalize GitHub owner
        id: owner
        run: echo "lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: ${{ steps.owner.outputs.lower }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @guardrails/guardrails build

      - name: Prepare GitHub Packages name and version
        working-directory: packages/guardrails
        run: node ./scripts/prepare-publish-package.mjs
        env:
          OWNER_LOWER: ${{ steps.owner.outputs.lower }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm publish --no-git-checks
        working-directory: packages/guardrails
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
